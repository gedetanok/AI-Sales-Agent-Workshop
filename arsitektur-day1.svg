<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1360 680" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="aGray" markerWidth="10" markerHeight="8" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="aData" markerWidth="10" markerHeight="8" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#16a34a"/>
    </marker>
    <marker id="aRet" markerWidth="10" markerHeight="8" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#0891b2"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1360" height="680" fill="#ffffff"/>

  <!-- Title -->
  <text x="680" y="40" text-anchor="middle" font-size="26" font-weight="700" fill="#0f172a">Arsitektur AI Sales Agent on WhatsApp</text>
  <text x="680" y="66" text-anchor="middle" font-size="14" fill="#64748b">Perjalanan satu pesan: dari customer masuk ke sistem, lalu balasan kembali ke customer</text>

  <!-- ===== MAIN FLOW (inbound) ===== -->
  <!-- Customer -->
  <g>
    <rect x="40" y="120" width="170" height="96" rx="12" fill="#E7F9EF" stroke="#059669" stroke-width="2"/>
    <text x="125" y="162" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">Customer</text>
    <text x="125" y="184" text-anchor="middle" font-size="12" fill="#475569">WhatsApp</text>
  </g>
  <!-- Evolution API -->
  <g>
    <rect x="260" y="120" width="170" height="96" rx="12" fill="#E8F0FE" stroke="#2563EB" stroke-width="2"/>
    <text x="345" y="158" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">Evolution API</text>
    <text x="345" y="178" text-anchor="middle" font-size="11" fill="#475569">jembatan ke</text>
    <text x="345" y="193" text-anchor="middle" font-size="11" fill="#475569">WhatsApp (Zeabur)</text>
  </g>
  <!-- ngrok -->
  <g>
    <rect x="480" y="120" width="150" height="96" rx="12" fill="#E8F0FE" stroke="#2563EB" stroke-width="2"/>
    <text x="555" y="162" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">ngrok</text>
    <text x="555" y="184" text-anchor="middle" font-size="11" fill="#475569">tunnel publik</text>
  </g>
  <!-- main.py -->
  <g>
    <rect x="680" y="120" width="190" height="96" rx="12" fill="#F1ECFE" stroke="#7C3AED" stroke-width="2"/>
    <text x="775" y="156" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">FastAPI  /webhook</text>
    <text x="775" y="177" text-anchor="middle" font-size="11" fill="#475569">main.py</text>
    <text x="775" y="192" text-anchor="middle" font-size="11" fill="#475569">buffer + debounce</text>
  </g>
  <!-- agent -->
  <g>
    <rect x="920" y="120" width="190" height="96" rx="12" fill="#FFF1E6" stroke="#EA580C" stroke-width="2"/>
    <text x="1015" y="156" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">Agent + Gemini</text>
    <text x="1015" y="177" text-anchor="middle" font-size="11" fill="#475569">agent.py</text>
    <text x="1015" y="192" text-anchor="middle" font-size="11" fill="#475569">loop tool-calling</text>
  </g>

  <!-- inbound arrows -->
  <line x1="212" y1="168" x2="256" y2="168" stroke="#475569" stroke-width="2" marker-end="url(#aGray)"/>
  <text x="234" y="158" text-anchor="middle" font-size="11" fill="#64748b">kirim</text>
  <line x1="432" y1="168" x2="476" y2="168" stroke="#475569" stroke-width="2" marker-end="url(#aGray)"/>
  <text x="454" y="158" text-anchor="middle" font-size="11" fill="#64748b">webhook</text>
  <line x1="632" y1="168" x2="676" y2="168" stroke="#475569" stroke-width="2" marker-end="url(#aGray)"/>
  <text x="655" y="158" text-anchor="middle" font-size="11" fill="#64748b">tunnel</text>
  <line x1="872" y1="168" x2="916" y2="168" stroke="#475569" stroke-width="2" marker-end="url(#aGray)"/>
  <text x="894" y="158" text-anchor="middle" font-size="11" fill="#64748b">digabung</text>

  <!-- ===== DATA / FEEDERS ===== -->
  <!-- system.md -->
  <g>
    <rect x="710" y="300" width="160" height="66" rx="10" fill="#FDE8F2" stroke="#DB2777" stroke-width="2"/>
    <text x="790" y="332" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">system.md</text>
    <text x="790" y="351" text-anchor="middle" font-size="11" fill="#475569">persona + aturan</text>
  </g>
  <!-- tools.py -->
  <g>
    <rect x="900" y="300" width="150" height="66" rx="10" fill="#E8F8EE" stroke="#16A34A" stroke-width="2"/>
    <text x="975" y="332" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">tools.py</text>
    <text x="975" y="351" text-anchor="middle" font-size="11" fill="#475569">aksi ke data</text>
  </g>
  <!-- memory.py -->
  <g>
    <rect x="1080" y="300" width="160" height="66" rx="10" fill="#E8F8EE" stroke="#16A34A" stroke-width="2"/>
    <text x="1160" y="332" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">memory.py</text>
    <text x="1160" y="351" text-anchor="middle" font-size="11" fill="#475569">riwayat + takeover</text>
  </g>
  <!-- database -->
  <g>
    <rect x="900" y="430" width="220" height="80" rx="12" fill="#E8F8EE" stroke="#16A34A" stroke-width="2.5"/>
    <text x="1010" y="466" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">Database (clinic.db)</text>
    <text x="1010" y="487" text-anchor="middle" font-size="11" fill="#475569">treatment · booking · jadwal · chat</text>
  </g>

  <!-- feeders into agent (point up) -->
  <line x1="800" y1="300" x2="955" y2="218" stroke="#16a34a" stroke-width="2" marker-end="url(#aData)"/>
  <line x1="975" y1="300" x2="1010" y2="218" stroke="#16a34a" stroke-width="2" marker-end="url(#aData)"/>
  <line x1="1150" y1="300" x2="1070" y2="218" stroke="#16a34a" stroke-width="2" marker-end="url(#aData)"/>
  <text x="790" y="290" text-anchor="middle" font-size="11" fill="#64748b">kepribadian</text>

  <!-- tools/memory to database (read/write) -->
  <line x1="975" y1="366" x2="985" y2="428" stroke="#16a34a" stroke-width="2" marker-end="url(#aData)"/>
  <line x1="1160" y1="366" x2="1055" y2="428" stroke="#16a34a" stroke-width="2" marker-end="url(#aData)"/>
  <text x="1135" y="400" text-anchor="middle" font-size="11" fill="#64748b">baca / tulis</text>

  <!-- ===== RETURN (outbound) ===== -->
  <path d="M 1110,150 L 1250,150 L 1250,575 L 125,575 L 125,218"
        fill="none" stroke="#0891b2" stroke-width="2.5" marker-end="url(#aRet)"/>
  <text x="660" y="563" text-anchor="middle" font-size="12.5" font-weight="600" fill="#0e7490">balasan → dipecah jadi bubble + efek "mengetik"  (whatsapp.py → Evolution → WhatsApp)</text>

  <!-- ===== LEGEND ===== -->
  <g font-size="12" fill="#334155">
    <rect x="40" y="624" width="16" height="16" rx="3" fill="#E7F9EF" stroke="#059669" stroke-width="1.5"/>
    <text x="63" y="636">Customer (WhatsApp)</text>
    <rect x="245" y="624" width="16" height="16" rx="3" fill="#E8F0FE" stroke="#2563EB" stroke-width="1.5"/>
    <text x="268" y="636">Kurir / Jembatan</text>
    <rect x="420" y="624" width="16" height="16" rx="3" fill="#F1ECFE" stroke="#7C3AED" stroke-width="1.5"/>
    <text x="443" y="636">Orkestrator</text>
    <rect x="565" y="624" width="16" height="16" rx="3" fill="#FFF1E6" stroke="#EA580C" stroke-width="1.5"/>
    <text x="588" y="636">Otak (AI)</text>
    <rect x="690" y="624" width="16" height="16" rx="3" fill="#FDE8F2" stroke="#DB2777" stroke-width="1.5"/>
    <text x="713" y="636">Kepribadian</text>
    <rect x="835" y="624" width="16" height="16" rx="3" fill="#E8F8EE" stroke="#16A34A" stroke-width="1.5"/>
    <text x="858" y="636">Data dan Ingatan</text>
  </g>
</svg>
