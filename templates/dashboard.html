<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — AI Sales Agent</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script>
  tailwind.config = { theme: { extend: {
    fontFamily: { sans: ['Inter','ui-sans-serif','system-ui','sans-serif'] },
    colors: { brand: { 50:'#f5f3ff',100:'#ede9fe',200:'#ddd6fe',500:'#7c3aed',600:'#6d28d9',700:'#5b21b6' } }
  } } };
</script>
<style>
  *{font-family:'Inter',sans-serif}
  .chat-bg{background-color:#f6f5f1;background-image:radial-gradient(#e2ded2 0.6px,transparent 0.6px);background-size:20px 20px}
  .scroll::-webkit-scrollbar{width:7px;height:7px}
  .scroll::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:99px}
  .scroll::-webkit-scrollbar-track{background:transparent}
  .switch{width:42px;height:24px;border-radius:99px;background:#cbd5e1;position:relative;transition:.2s;cursor:pointer;flex:none}
  .switch::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:99px;background:#fff;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
  .switch:checked{background:#0f172a}
  .switch:checked::after{transform:translateX(18px)}
  .switch{-webkit-appearance:none;appearance:none}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .shimmer{animation:pulse 1.2s ease-in-out infinite}
</style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">

<!-- ===== API KEY GATE ===== -->
<div id="keyModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 hidden items-center justify-center">
  <div class="bg-white rounded-2xl p-8 w-[400px] shadow-2xl">
    <div class="w-12 h-12 rounded-xl bg-slate-900 grid place-items-center mb-4">
      <svg class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
    </div>
    <h2 class="text-xl font-bold mb-1">Masuk Dashboard</h2>
    <p class="text-sm text-slate-500 mb-5">Masukkan <code class="bg-slate-100 px-1.5 py-0.5 rounded text-xs">DASHBOARD_API_KEY</code> dari file .env.</p>
    <input id="keyInput" type="password" placeholder="API key…" onkeydown="if(event.key==='Enter')saveKey()" class="w-full border border-slate-300 rounded-xl px-4 py-2.5 mb-3 focus:outline-none focus:ring-2 focus:ring-slate-400 focus:border-slate-400">
    <p id="keyError" class="text-sm text-red-500 mb-3 hidden">API key salah, coba lagi.</p>
    <button onclick="saveKey()" class="w-full bg-slate-900 hover:bg-slate-800 text-white rounded-xl py-2.5 font-semibold transition">Masuk</button>
  </div>
</div>

<!-- ===== APP SHELL ===== -->
<div id="app" class="flex h-screen hidden">

  <!-- SIDEBAR -->
  <aside class="w-64 bg-white border-r border-slate-200 flex flex-col shrink-0">
    <div class="px-5 py-5 flex items-center gap-3">
      <div id="brandMark" class="w-10 h-10 rounded-xl bg-slate-900 text-white grid place-items-center font-extrabold text-lg shrink-0">G</div>
      <div class="min-w-0">
        <div id="brandName" class="font-bold text-slate-800 truncate leading-tight">—</div>
        <div class="text-[11px] text-slate-400">AI Sales Dashboard</div>
      </div>
    </div>
    <nav class="px-3 mt-2 space-y-1">
      <div class="px-3 py-1.5 text-[11px] font-semibold uppercase tracking-wider text-slate-400">Menu</div>
      <button data-view="conversations" onclick="switchView('conversations')" class="nav w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-left text-sm text-slate-600 hover:bg-slate-50 transition">
        <svg class="w-5 h-5 ic" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.86 9.86 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
        Conversations
      </button>
      <button data-view="bookings" onclick="switchView('bookings')" class="nav w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-left text-sm text-slate-600 hover:bg-slate-50 transition">
        <svg class="w-5 h-5 ic" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        Bookings
      </button>
    </nav>
    <div class="mt-auto m-3 p-3 rounded-xl bg-slate-50 flex items-center gap-3">
      <div class="w-9 h-9 rounded-full bg-slate-100 text-slate-600 grid place-items-center font-bold text-sm">AD</div>
      <div class="text-xs leading-tight min-w-0"><div class="font-semibold truncate">Admin</div><div class="text-slate-400">Dashboard</div></div>
    </div>
  </aside>

  <!-- ===== VIEW: CONVERSATIONS ===== -->
  <section id="view-conversations" class="flex-1 flex min-w-0">
    <!-- list -->
    <div class="w-80 bg-white border-r border-slate-200 flex flex-col shrink-0">
      <div class="px-5 pt-5 pb-3">
        <h1 class="font-bold text-xl mb-3">Percakapan</h1>
        <div class="relative">
          <svg class="w-4 h-4 text-slate-400 absolute left-3 top-1/2 -translate-y-1/2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M11 18a7 7 0 100-14 7 7 0 000 14z"/></svg>
          <input id="convSearch" oninput="renderConvList()" placeholder="Cari percakapan…" class="w-full bg-slate-100 rounded-xl pl-9 pr-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-slate-300">
        </div>
      </div>
      <div id="convList" class="flex-1 overflow-y-auto scroll"></div>
    </div>
    <!-- thread -->
    <div class="flex-1 flex flex-col min-w-0">
      <div id="threadHeader" class="h-[68px] border-b border-slate-200 bg-white px-6 flex items-center justify-between shrink-0">
        <div class="text-slate-400 text-sm">Pilih percakapan di kiri untuk mulai</div>
      </div>
      <div id="threadBody" class="flex-1 overflow-y-auto scroll chat-bg p-6 space-y-1.5"></div>
      <div id="threadInput" class="border-t border-slate-200 bg-white p-3.5 hidden">
        <div class="flex items-center gap-2">
          <input id="msgInput" onkeydown="if(event.key==='Enter')sendMessage()" placeholder="Tulis pesan Anda…" class="flex-1 bg-slate-100 rounded-full px-5 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-slate-300">
          <button onclick="sendMessage()" class="w-11 h-11 rounded-full bg-slate-900 hover:bg-slate-800 text-white grid place-items-center transition shrink-0">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M3.4 20.4l17.45-7.48a1 1 0 000-1.84L3.4 3.6a.993.993 0 00-1.39.91L2 9.12c0 .5.37.93.87.99L17 12 2.87 13.88c-.5.07-.87.5-.87 1l.01 4.61c0 .71.73 1.2 1.39.91z"/></svg>
          </button>
        </div>
      </div>
    </div>
    <!-- detail -->
    <div id="detailPane" class="w-72 bg-white border-l border-slate-200 overflow-y-auto scroll hidden shrink-0"></div>
  </section>

  <!-- ===== VIEW: BOOKINGS ===== -->
  <section id="view-bookings" class="flex-1 overflow-y-auto scroll hidden bg-slate-50">
    <div class="p-8 max-w-[1500px]">
      <div class="flex items-center justify-between mb-6">
        <div>
          <h1 class="text-2xl font-bold">Booking Treatment</h1>
          <p class="text-slate-500 text-sm mt-0.5">Kelola jadwal dan status booking pelanggan.</p>
        </div>
        <button onclick="loadBookings()" class="px-4 py-2 border border-slate-200 bg-white rounded-xl text-sm font-medium hover:bg-slate-50 transition flex items-center gap-2">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
          Refresh
        </button>
      </div>

      <div id="bkStats" class="grid grid-cols-4 gap-4 mb-6"></div>

      <div class="flex flex-wrap items-center gap-2 mb-4">
        <div class="relative">
          <svg class="w-4 h-4 text-slate-400 absolute left-3 top-1/2 -translate-y-1/2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M11 18a7 7 0 100-14 7 7 0 000 14z"/></svg>
          <input id="bkSearch" oninput="applyBookingFilters()" placeholder="Cari nama / treatment…" class="bg-white border border-slate-200 rounded-xl pl-9 pr-3 py-2.5 text-sm w-60 focus:outline-none focus:ring-2 focus:ring-slate-300">
        </div>
        <div id="bkRange" class="flex gap-1.5"></div>
        <select id="bkStatus" onchange="applyBookingFilters()" class="border border-slate-200 rounded-xl px-3 py-2.5 text-sm bg-white focus:outline-none">
          <option value="all">Semua Status</option>
          <option value="pending">Pending</option>
          <option value="confirmed">Confirmed</option>
          <option value="completed">Selesai</option>
          <option value="cancelled">Batal</option>
        </select>
      </div>

      <div class="bg-white border border-slate-200 rounded-2xl overflow-hidden">
        <table class="w-full text-sm">
          <thead class="text-left text-slate-500 border-b border-slate-200 bg-slate-50/70">
            <tr>
              <th class="px-6 py-3.5 font-semibold">Pelanggan</th>
              <th class="px-6 py-3.5 font-semibold">Layanan</th>
              <th class="px-6 py-3.5 font-semibold">Jadwal</th>
              <th class="px-6 py-3.5 font-semibold">Telepon</th>
              <th class="px-6 py-3.5 font-semibold">Status</th>
              <th class="px-6 py-3.5 font-semibold text-right">Aksi</th>
            </tr>
          </thead>
          <tbody id="bkRows"></tbody>
        </table>
      </div>
    </div>
  </section>
</div>

<script>
// ============ STATE & HELPERS ============
const KEY = 'dash_key';
const getKey = () => localStorage.getItem(KEY) || '';
let convCache = [], currentPhone = null, bkRange = 'all';

const STATUS_LABEL = { pending:'Pending', confirmed:'Confirmed', completed:'Selesai', cancelled:'Batal' };
const STATUS_DOT = { pending:'bg-amber-500', confirmed:'bg-blue-500', completed:'bg-emerald-500', cancelled:'bg-red-500' };
const STATUS_CLASS = {
  pending:'bg-amber-50 text-amber-700', confirmed:'bg-blue-50 text-blue-700',
  completed:'bg-emerald-50 text-emerald-700', cancelled:'bg-red-50 text-red-600',
};
const esc = s => (s||'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const initials = n => (n||'?').replace(/[^A-Za-z0-9 ]/g,'').trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase() || '?';
function avatar(name, size='w-10 h-10', text='text-xs'){
  return `<div class="${size} bg-slate-200 text-slate-600 rounded-full grid place-items-center ${text} font-bold shrink-0">${initials(name)}</div>`;
}
function fmtClock(iso){ return new Date(iso).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}); }
function fmtListTime(iso){ const d=new Date(iso),n=new Date();
  return d.toDateString()===n.toDateString()?fmtClock(iso):d.toLocaleDateString('id-ID',{day:'2-digit',month:'short'}); }

async function apiFetch(path, opts={}){
  const res = await fetch(path, {...opts, headers:{...(opts.headers||{}),'X-API-Key':getKey(),'Content-Type':'application/json'}});
  if(res.status===401){ showKeyModal(true); throw new Error('unauthorized'); }
  if(!res.ok) throw new Error('HTTP '+res.status);
  return res.json();
}

// ============ API KEY GATE ============
function showKeyModal(err){ const m=document.getElementById('keyModal'); m.classList.remove('hidden'); m.classList.add('flex');
  document.getElementById('app').classList.add('hidden'); document.getElementById('keyError').classList.toggle('hidden',!err); }
function hideKeyModal(){ const m=document.getElementById('keyModal'); m.classList.add('hidden'); m.classList.remove('flex');
  document.getElementById('app').classList.remove('hidden'); }
async function saveKey(){ localStorage.setItem(KEY, document.getElementById('keyInput').value.trim()); await boot(); }

// ============ NAV ============
function switchView(v){
  document.querySelectorAll('.nav').forEach(b=>{
    const on=b.dataset.view===v;
    b.classList.toggle('bg-slate-100',on); b.classList.toggle('text-slate-900',on);
    b.classList.toggle('font-semibold',on); b.classList.toggle('text-slate-600',!on);
    b.querySelector('.ic').classList.toggle('text-slate-900',on);
  });
  document.getElementById('view-conversations').classList.toggle('hidden', v!=='conversations');
  document.getElementById('view-conversations').classList.toggle('flex', v==='conversations');
  document.getElementById('view-bookings').classList.toggle('hidden', v!=='bookings');
  if(v==='bookings') loadBookings(); else loadConversations();
}

// ============ CONVERSATIONS ============
async function loadConversations(){ convCache = await apiFetch('/dashboard/api/conversations'); renderConvList(); }

function renderConvList(){
  const q=document.getElementById('convSearch').value.toLowerCase();
  const list=convCache.filter(c=>c.name.toLowerCase().includes(q)||c.phone.includes(q));
  document.getElementById('convList').innerHTML = list.map(c=>{
    const preview=c.last_text.includes('[image:')?'📷 Foto':c.last_text.replace(/\[NEXT\]/g,' ').replace(/\[WAIT\]|\[HANDOVER\]/g,'').trim();
    const who=c.last_role==='model'?'Anda: ':'';
    const badges=(c.handover?'<span class="text-[10px] font-medium bg-amber-100 text-amber-700 px-2 py-0.5 rounded-full">Handover</span>':'')
               +(c.has_booking?'<span class="text-[10px] font-medium bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-full">Booking</span>':'');
    return `<div onclick="openConversation('${c.phone}')" class="px-4 py-3 cursor-pointer border-l-2 transition ${c.phone===currentPhone?'bg-slate-100 border-slate-900':'border-transparent hover:bg-slate-50'}">
      <div class="flex items-center gap-3">
        ${avatar(c.name)}
        <div class="min-w-0 flex-1">
          <div class="flex justify-between items-center gap-2"><span class="font-semibold text-sm truncate">${esc(c.name)}</span><span class="text-[11px] text-slate-400 shrink-0">${fmtListTime(c.last_time)}</span></div>
          <div class="text-xs text-slate-500 truncate mt-0.5">${esc(who+preview)}</div>
          ${badges?`<div class="flex gap-1 mt-1.5">${badges}</div>`:''}
        </div>
      </div></div>`;
  }).join('') || '<div class="p-10 text-center text-sm text-slate-400">Belum ada percakapan</div>';
}

function renderMsgBody(text){
  let html='',re=/\[image:([^\]]+)\]/g,last=0,m;
  while((m=re.exec(text))){
    const before=text.slice(last,m.index).replace(/\[NEXT\]/g,'\n').trim();
    if(before) html+=`<div>${esc(before).replace(/\n/g,'<br>')}</div>`;
    const src=m[1].startsWith('http')?m[1]:'/'+m[1];   // R2 (URL absolut) atau lokal
    html+=`<img src="${src}" class="rounded-xl max-w-[220px] mt-1">`;
    last=m.index+m[0].length;
  }
  const rest=text.slice(last).replace(/\[NEXT\]/g,'\n').trim();
  if(rest) html+=`<div>${esc(rest).replace(/\n/g,'<br>')}</div>`;
  return html||esc(text);
}

// Pecah 1 pesan tersimpan jadi beberapa bubble (sama seperti whatsapp.send_reply):
// buang [WAIT]/[HANDOVER], lalu split di [NEXT] atau baris kosong.
function splitBubbles(text){
  const clean=(text||'').replace(/\[WAIT\]/g,'').replace(/\[HANDOVER\]/g,'');
  return clean.split(/\[NEXT\]|\n\s*\n/).map(s=>s.trim()).filter(Boolean);
}

async function openConversation(phone){
  currentPhone=phone;
  const d=await apiFetch('/dashboard/api/conversations/'+phone);
  renderConvList();

  document.getElementById('threadHeader').innerHTML=`
    <div class="flex items-center gap-3">${avatar(d.name,'w-10 h-10','text-sm')}
      <div><div class="font-semibold leading-tight">${esc(d.name)}</div><div class="text-xs text-slate-400">${esc(d.phone)}</div></div></div>
    <label class="flex items-center gap-2.5 text-sm cursor-pointer select-none">
      <span class="${d.ai_enabled?'text-slate-900 font-medium':'text-slate-400'}">AI ${d.ai_enabled?'Aktif':'Mati'}</span>
      <input type="checkbox" class="switch" ${d.ai_enabled?'checked':''} onchange="toggleAI('${phone}',this.checked)">
    </label>`;

  document.getElementById('threadBody').innerHTML=d.messages.map(msg=>{
    const mine=msg.role==='model';
    const segs=splitBubbles(msg.text);
    if(!segs.length) return '';
    return segs.map((seg,i)=>{
      const showTime=i===segs.length-1;
      return `<div class="flex ${mine?'justify-end':'justify-start'}">
        <div class="max-w-[68%] px-3.5 py-2 rounded-2xl text-sm leading-snug shadow-sm ${mine?'bg-slate-900 text-white rounded-br-md':'bg-white rounded-bl-md'}">
          ${renderMsgBody(seg)}
          ${showTime?`<div class="text-[10px] ${mine?'text-white/60':'text-slate-400'} text-right mt-1">${fmtClock(msg.time)}</div>`:''}
        </div></div>`;
    }).join('');
  }).join('') || '<div class="text-center text-sm text-slate-400 mt-12">Belum ada pesan</div>';
  const body=document.getElementById('threadBody'); body.scrollTop=body.scrollHeight;
  document.getElementById('threadInput').classList.remove('hidden');

  const ret=d.is_returning?'<span class="text-[11px] font-medium bg-emerald-100 text-emerald-700 px-2.5 py-1 rounded-full">Returning</span>'
                          :'<span class="text-[11px] font-medium bg-slate-100 text-slate-500 px-2.5 py-1 rounded-full">New</span>';
  const bookings=d.bookings.length?d.bookings.map(b=>`
      <div class="border border-slate-200 rounded-xl p-3 mb-2">
        <div class="flex justify-between items-start gap-2"><span class="font-medium text-sm">${esc(b.treatment)}</span>
          <span class="text-[10px] font-medium px-2 py-0.5 rounded-full ${STATUS_CLASS[b.status]||''} whitespace-nowrap">${STATUS_LABEL[b.status]||b.status}</span></div>
        <div class="text-xs text-slate-500 mt-1.5">${b.date} · ${b.time}</div>
        <div class="text-[11px] text-slate-400 mt-0.5">${b.code}</div>
      </div>`).join(''):'<div class="text-xs text-slate-400">Belum ada booking</div>';
  const dp=document.getElementById('detailPane'); dp.classList.remove('hidden');
  dp.innerHTML=`
    <div class="p-5 border-b border-slate-200 text-center">
      ${avatar(d.name,'w-16 h-16','text-xl').replace('shrink-0','mx-auto')}
      <div class="font-bold mt-2">${esc(d.name)}</div>
      <div class="text-xs text-slate-400">${esc(d.phone)}</div>
      <div class="mt-2">${ret}</div>
    </div>
    <div class="p-5">
      <div class="text-[11px] font-semibold uppercase tracking-wider text-slate-400 mb-3">Riwayat Booking</div>
      ${bookings}
    </div>`;
}

async function toggleAI(phone, enabled){
  await apiFetch('/dashboard/api/conversations/'+phone+'/ai',{method:'POST',body:JSON.stringify({enabled})});
  await openConversation(phone); await loadConversations();
}
async function sendMessage(){
  const input=document.getElementById('msgInput'),text=input.value.trim();
  if(!text||!currentPhone) return;
  input.value=''; input.disabled=true;
  try{ await apiFetch('/dashboard/api/conversations/'+currentPhone+'/send',{method:'POST',body:JSON.stringify({text})}); await openConversation(currentPhone); }
  finally{ input.disabled=false; input.focus(); }
}

// ============ BOOKINGS ============
const RANGES=[['today','Hari Ini'],['7','7 Hari'],['30','30 Hari'],['90','90 Hari'],['all','Semua']];
function renderRangeButtons(){
  document.getElementById('bkRange').innerHTML=RANGES.map(([v,l])=>
    `<button onclick="setRange('${v}')" class="px-3.5 py-2.5 rounded-xl text-sm font-medium transition ${bkRange===v?'bg-slate-900 text-white':'bg-white border border-slate-200 hover:bg-slate-50'}">${l}</button>`).join('');
}
function setRange(v){ bkRange=v; renderRangeButtons(); applyBookingFilters(); }
async function loadBookings(){ renderRangeButtons(); applyBookingFilters(); }

const STAT_ICONS={
  today:'M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z',
  total:'M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4',
  active:'M13 7h8m0 0v8m0-8l-8 8-4-4-6 6',
  completed:'M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z',
};
async function applyBookingFilters(){
  const q=document.getElementById('bkSearch').value,status=document.getElementById('bkStatus').value;
  const data=await apiFetch(`/dashboard/api/bookings?range=${bkRange}&status=${status}&q=${encodeURIComponent(q)}`);
  const cards=[['Hari Ini',data.stats.today,'today','5 belum selesai'],['Total Booking',data.stats.total,'total','semua booking'],
               ['Aktif',data.stats.active,'active','pending & confirmed'],['Selesai',data.stats.completed,'completed','completed']];
  document.getElementById('bkStats').innerHTML=cards.map(([l,v,k])=>{
    const path=STAT_ICONS[k];
    return `<div class="bg-white border border-slate-200 rounded-2xl p-5">
      <div class="flex items-center justify-between">
        <span class="text-sm text-slate-500">${l}</span>
        <div class="w-9 h-9 rounded-xl bg-slate-100 grid place-items-center">
          <svg class="w-5 h-5 text-slate-700" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="${path}"/></svg>
        </div>
      </div>
      <div class="text-3xl font-bold mt-2">${v}</div></div>`;
  }).join('');
  document.getElementById('bkRows').innerHTML=data.bookings.map(b=>`
    <tr class="border-b border-slate-100 last:border-0 hover:bg-slate-50/60 transition">
      <td class="px-6 py-3.5"><div class="flex items-center gap-2.5">${avatar(b.customer_name,'w-8 h-8','text-[10px]')}<span class="font-medium">${esc(b.customer_name)}</span></div></td>
      <td class="px-6 py-3.5 text-slate-600">${esc(b.treatment)}</td>
      <td class="px-6 py-3.5"><div class="font-medium">${b.time}</div><div class="text-xs text-slate-400">${b.date}</div></td>
      <td class="px-6 py-3.5 text-slate-500">${esc(b.phone)}</td>
      <td class="px-6 py-3.5"><span class="inline-flex items-center gap-1.5 text-xs font-medium px-2.5 py-1 rounded-full ${STATUS_CLASS[b.status]||''}"><span class="w-1.5 h-1.5 rounded-full ${STATUS_DOT[b.status]||''}"></span>${STATUS_LABEL[b.status]||b.status}</span></td>
      <td class="px-6 py-3.5 text-right">
        <select onchange="updateBooking('${b.code}',this.value)" class="border border-slate-200 rounded-lg px-2.5 py-1.5 text-xs bg-white focus:outline-none cursor-pointer">
          <option value="">Ubah…</option><option value="pending">Pending</option><option value="confirmed">Confirmed</option>
          <option value="completed">Selesai</option><option value="cancelled">Batal</option>
        </select></td>
    </tr>`).join('') || '<tr><td colspan="6" class="px-6 py-14 text-center text-slate-400">Tidak ada booking</td></tr>';
}
async function updateBooking(code,status){ if(!status) return;
  await apiFetch('/dashboard/api/bookings/'+code+'/status',{method:'POST',body:JSON.stringify({status})}); applyBookingFilters(); }

// ============ BOOT ============
async function boot(){
  try{
    const cfg=await apiFetch('/dashboard/api/config');
    document.getElementById('brandName').textContent=cfg.company;
    document.getElementById('brandMark').textContent=(cfg.company.trim()[0]||'D').toUpperCase();
    document.title=cfg.company+' — Dashboard';
    hideKeyModal(); switchView('conversations');
  }catch(e){}
}
setInterval(()=>{ if(getKey() && !document.getElementById('app').classList.contains('hidden')
  && !document.getElementById('view-conversations').classList.contains('hidden')){
  loadConversations(); if(currentPhone) openConversation(currentPhone);
}}, 12000);

if(getKey()) boot(); else showKeyModal(false);
</script>
</body>
</html>
